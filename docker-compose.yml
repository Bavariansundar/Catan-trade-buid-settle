services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: baychearsbar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baychearsbar}
      POSTGRES_DB: baychearsbar
    ports:
      # Bound to the host loopback only — reachable from a locally-run `pnpm
      # dev` server (see README's "Running with Docker"), not from the
      # network. Never publish this on 0.0.0.0 in production.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baychearsbar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379" # see the postgres service's port comment above
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://baychearsbar:${POSTGRES_PASSWORD:-baychearsbar}@postgres:5432/baychearsbar
      REDIS_URL: redis://redis:6379
      # No dev-convenience default for these two — see docs/deployment.md.
      # `${VAR:?message}` makes `docker compose up` fail immediately with a
      # clear error if .env doesn't set them, instead of the server
      # container crash-looping on every restart.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env, see .env.example}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env, see .env.example}
      # Defaults to "*" (any origin) for local/dev convenience — restrict to
      # your real public origin(s) in production. See docs/deployment.md.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Defaults to http://localhost:3001 — correct for a single-host
        # `docker compose up`. Set VITE_API_URL in .env to the API's real
        # public origin for any deployment reachable outside your own
        # machine — see docs/deployment.md.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
